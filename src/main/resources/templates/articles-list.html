<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Articles</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 30px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        h1 { color: #333; font-size: 26px; }
        .btn-add, .btn-back {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-back { background: #555; margin-left: 8px; }
        .btn-logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 6px 14px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            border: none;
            cursor: pointer;
        }
        .btn-view {
            background: #3498db;
            color: white;
            padding: 6px 14px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            margin-right: 5px;
        }
        .no-data { text-align: center; padding: 30px; color: #999; }
        .role-badge {
            background: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>📝 Liste des Articles</h1>
            <small>
                <span class="role-badge"
                      sec:authorize="hasRole('ADMIN')">👑 ADMIN</span>
                <span class="role-badge"
                      sec:authorize="hasRole('USER')">👤 USER</span>
                <span sec:authentication="name"></span>
            </small>
        </div>
        <div>
            <!-- Ajouter - للـ ADMIN فقط -->
            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/articles/new}" class="btn-add">
                    + Nouvel Article
                </a>
            </span>

            <a th:href="@{/products}" class="btn-back">← Produits</a>

            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn-logout">Déconnexion</button>
            </form>
        </div>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Voir</th>
            <!-- عمود Supprimer للـ ADMIN فقط -->
            <th sec:authorize="hasRole('ADMIN')">Supprimer</th>
        </tr>
        <tr th:if="${#lists.isEmpty(articles)}">
            <td colspan="4" class="no-data">Aucun article trouvé.</td>
        </tr>
        <tr th:each="article : ${articles}">
            <td th:text="${article.id}"></td>
            <td th:text="${article.title}"></td>
            <td>
                <a th:href="@{/articles/{id}(id=${article.id})}"
                   class="btn-view">Voir</a>
            </td>
            <!-- Supprimer للـ ADMIN فقط -->
            <td sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/articles/delete/{id}(id=${article.id})}"
                      method="post" style="display:inline">
                    <button type="submit" class="btn-delete">
                        Supprimer
                    </button>
                </form>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
