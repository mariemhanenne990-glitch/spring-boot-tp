<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Article</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #555;
            text-decoration: none;
        }
        h1 { color: #333; margin-bottom: 15px; }
        .content { color: #444; margin-bottom: 25px; line-height: 1.5; }
        h2 { color: #333; font-size: 18px; margin-bottom: 15px; }
        .comment {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .comment b { color: #4CAF50; }
        .comment p { margin-top: 5px; color: #444; }
        h3 { margin: 20px 0 10px; color: #333; font-size: 16px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-buy {
            display: block;
            width: 100%;
            padding: 14px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .btn-buy:hover { background: #e67e22; }
        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/articles}" class="btn-back">← Retour aux articles</a>

    <h1 th:text="${article.title}">Titre</h1>
    <p class="content" th:text="${article.content}">Contenu</p>

    <!-- زر الشراء للـ USER والـ ADMIN -->
    <button class="btn-buy"
            onclick="alert('✅ Achat effectué avec succès!')">
        🛒 Acheter cet article
    </button>

    <hr class="divider"/>

    <h2>💬 Commentaires
        (<span th:text="${article.comments.size()}">0</span>)
    </h2>

    <div th:each="comment : ${article.comments}" class="comment">
        <b th:text="${comment.author}">Auteur</b>
        <p th:text="${comment.text}">Texte</p>
    </div>

    <!-- تعليق للـ ADMIN فقط -->
    <div sec:authorize="hasRole('ADMIN')">
        <h3>✏️ Ajouter un commentaire</h3>
        <form th:action="@{/comments/add/{id}(id=${article.id})}"
              th:object="${newComment}" method="post">
            <input type="text" th:field="*{author}" placeholder="Nom"/>
            <textarea th:field="*{text}" rows="3"
                      placeholder="Votre commentaire..."></textarea>
            <button type="submit" class="btn-submit">Envoyer</button>
        </form>
    </div>

    <!-- رسالة للـ USER -->
    <div sec:authorize="hasRole('USER')">
        <p style="color:#999; text-align:center; margin-top:15px;">
            💡 Connectez-vous en tant qu'admin pour ajouter des commentaires.
        </p>
    </div>

</div>
</body>
</html>
